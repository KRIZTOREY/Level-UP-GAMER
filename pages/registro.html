<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="siteHeader"></div>
    <main class="page-main">
        <section id="registro" class="form-section">
            <h2>Registro de Usuario</h2>
            <form id="formRegistro">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" placeholder="Nombre" required>
                <span id="errorNombre" class="error" data-for="nombre"></span>

                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" placeholder="Apellido" required>
                <span id="errorApellido" class="error" data-for="apellido"></span>

                <label for="fechaNacimiento">Fecha de Nacimiento</label>
                <input type="date" id="fechaNacimiento" required>
                <span id="errorFecha" class="error" data-for="fechaNacimiento"></span>

                <label for="correo">Email</label>
                <input type="email" id="correo" placeholder="correo@ejemplo.cl" required>
                <span id="errorCorreo" class="error" data-for="correo"></span>

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Contraseña" required>
                <span id="errorPassword" class="error" data-for="password"></span>

                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" placeholder="Repetir contraseña" required>
                <span id="errorConfirm" class="error" data-for="confirmPassword"></span>

                <button type="submit">Registrarse</button>
            </form>
        </section>
    </main>
    <div id="siteFooter"></div>
    <script src="../js/validaciones.js"></script>
    <script src="../js/registro.js"></script>
    <script src="../js/components.js"></script>
</body>
</html>
