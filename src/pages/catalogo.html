<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="siteHeader"></div>
    <main class="page-main">
        <section id="catalogo">
            <h2>Catálogo de Productos</h2>
            <div class="catalogo-filtros">
                <input
                    type="search"
                    id="buscadorProductos"
                    placeholder="Buscar productos..."
                >
            </div>

            <section class="catalogo-editor" id="catalogoEditor" aria-labelledby="catalogoEditorTitulo" hidden>
                <div class="editor-header">
                    <h3 id="catalogoEditorTitulo">Editar catálogo</h3>
                    <button type="button" id="btnNuevoProducto" class="btn outline">Nuevo producto</button>
                </div>

                <form id="formProducto" class="producto-form">
                    <input type="hidden" id="modoEdicion" value="crear">

                    <label for="codigoProducto">Código</label>
                    <input type="text" id="codigoProducto" required maxlength="20" placeholder="Ej: JM001">

                    <label for="nombreProducto">Nombre</label>
                    <input type="text" id="nombreProducto" required maxlength="80" placeholder="Nombre del producto">

                    <label for="categoriaProducto">Categoría</label>
                    <input type="text" id="categoriaProducto" required maxlength="60" placeholder="Ej: Consolas">

                    <label for="precioProducto">Precio</label>
                    <input type="number" id="precioProducto" required min="0" step="1" placeholder="Ej: 29990">

                    <label for="stockProducto">Stock</label>
                    <input type="number" id="stockProducto" required min="0" step="1" placeholder="Ej: 12">

                    <label for="descripcionProducto">Descripción</label>
                    <textarea id="descripcionProducto" required rows="3" maxlength="220" placeholder="Descripción breve"></textarea>

                    <div class="form-actions">
                        <button type="submit" id="btnGuardarProducto">Guardar producto</button>
                        <button type="button" id="btnCancelarEdicion" class="btn outline">Cancelar</button>
                    </div>
                    <p id="mensajeCatalogo" class="catalogo-mensaje" aria-live="polite"></p>
                </form>
            </section>

            <div id="productos" class="productos"></div>
        </section>
    </main>
    <div id="siteFooter"></div>
    <script src="../js/carrito.js"></script>
    <script src="../js/productos.js"></script>
    <script src="../js/catalogo.js"></script>
    <script src="../js/components.js"></script>
</body>
</html>
