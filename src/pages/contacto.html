<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="siteHeader"></div>
    <main class="page-main">
        <section id="contacto" class="form-section">
            <h2>Contacto</h2>
            <p>Escríbenos para consultas, soporte técnico o recomendaciones.</p>
            <form id="formContacto">
                <label for="nombreContacto">Nombre</label>
                <input type="text" id="nombreContacto" placeholder="Tu nombre" required>
                <span id="errorNombre" class="error" data-for="nombreContacto"></span>

                <label for="correoContacto">Correo</label>
                <input type="email" id="correoContacto" placeholder="tu@correo.cl" required>
                <span id="errorCorreo" class="error" data-for="correoContacto"></span>

                <label for="motivoContacto">Motivo</label>
                <select id="motivoContacto">
                    <option value="">Selecciona un motivo</option>
                    <option value="soporte">Soporte técnico</option>
                    <option value="pedido">Pedido / envío</option>
                    <option value="producto">Consulta de producto</option>
                    <option value="referido">Programa de referidos</option>
                </select>
                <span id="errorMotivo" class="error" data-for="motivoContacto"></span>

                <label for="comentarioContacto">Mensaje</label>
                <textarea id="comentarioContacto" rows="5" placeholder="Cuéntanos cómo podemos ayudarte"></textarea>
                <span id="errorComentario" class="error" data-for="comentarioContacto"></span>

                <button type="submit">Enviar mensaje</button>
            </form>
        </section>
    </main>
    <div id="siteFooter"></div>
    <script src="../js/validaciones.js"></script>
    <script src="../js/contacto.js"></script>
    <script src="../js/components.js"></script>
</body>
</html>
