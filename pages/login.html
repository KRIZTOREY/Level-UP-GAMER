<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="siteHeader"></div>
    <main class="page-main">
        <section id="login" class="form-section">
            <h2>Iniciar Sesión</h2>
            <p>Ingrese sus credenciales para acceder a su cuenta.</p>
            <form id="formLogin">
                <label for="emailLogin">Email o usuario</label>
                <input
                    type="text"
                    id="emailLogin"
                    inputmode="email"
                    autocomplete="username"
                    placeholder="email@ejemplo.cl o admin"
                    required
                >
                <span id="errorEmail" class="error" data-for="emailLogin"></span>

                <label for="passLogin">Contraseña</label>
                <input
                    type="password"
                    id="passLogin"
                    autocomplete="current-password"
                    placeholder="Ingrese su contraseña"
                    required
                >
                <span id="errorPassword" class="error" data-for="passLogin"></span>

                <button id="btnLogin" type="submit">Iniciar Sesión</button>
            </form>
        </section>
    </main>
    <div id="siteFooter"></div>
    <script src="../js/validaciones.js"></script>
    <script src="../js/login.js"></script>
    <script src="../js/components.js"></script>
</body>
</html>
