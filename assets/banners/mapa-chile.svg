<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Mapa estilizado de Chile</title>
  <desc id="desc">Ilustración decorativa de Chile con efecto gamer para la sección de eventos.</desc>
  <defs>
