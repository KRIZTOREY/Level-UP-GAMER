<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="siteHeader"></div>
    <main class="page-main">
        <section id="perfil" class="info-section">
            <h2>Perfil de Usuario</h2>
            <div class="perfil-grid">
                <div class="card-producto">
                    <h3>Datos personales</h3>
                    <p>Usuario: <strong id="perfilNombre">Cargando...</strong></p>
                    <p>Email: <strong id="perfilEmail">Cargando...</strong></p>
                </div>
                <div class="card-producto">
                    <h3>Nivel LevelUp</h3>
                    <p><strong id="perfilNivel">Cargando...</strong></p>
                    <p><strong id="perfilPuntos">0 puntos</strong></p>
                    <p><strong id="perfilDescuento">Cargando descuento...</strong></p>
                </div>
                <div class="card-producto">
                    <h3>Historial de compras</h3>
                    <ul id="perfilHistorial">
                        <li>Cargando historial...</li>
                    </ul>
                </div>
            </div>
            <div class="perfil-actions">
                <a href="/src/pages/carrito.html" class="btn small">Ver carrito</a>
                <button type="button" class="btn small outline" id="logoutPerfilBtn">Cerrar sesión</button>
            </div>
        </section>
    </main>
    <div id="siteFooter"></div>
    <script src="../js/perfil.js"></script>
    <script src="../js/components.js"></script>
</body>
</html>
